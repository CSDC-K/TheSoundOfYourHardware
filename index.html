<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/src/main.ts" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Audiowide&display=swap" rel="stylesheet">

  </head>
  <body>


  
    <div class="docdiv" id="docdiv">
      <div class="doccentraldiv">
        <button class="doc_close_btn" id="doc_close_btn">
          <img src="src/assets/close.png" width="24px" height="24px">
        </button>
      </div>
    </div>

    <div class="appdiv" id="appdiv">

      <div class="appcentraldiv">

        <ul class="applist" id="applist">
          
        </ul>

        <button class="app_close_btn" id="app_close_btn">
          <img src="src/assets/close.png" width="24px" height="24px">
        </button>
        <button class="app_refresh_btn" id="app_refresh_btn">
          <img src="src/assets/refresh.png" width="24px" height="24px">
        </button>
        <button class="app_delete_btn" id="app_delete_btn">
          <img src="src/assets/delete.png" width="24px" height="24px">
        </button>

      </div>      
    </div>

    <div class="maindiv" id="maindiv">

      <h1 class="title" id="maintitle">The Sound Of Your Hardware</h1>

      <button id="docbtn"  type="button" class="docbtn">
        <img id="docimg" src="src/assets/doc.png" width="24px" height="24px">
      </button>

      <label class="lb1" id="label1">Choose a sound</label>
      <select class="soundlist" id="soundlist">
        <option value="None">Select a sound</option>
      </select>

      <label class="lb6" id="label6">Choose a app</label>
      <button id="applistbtn" class="applistbtn">
        <img src="src/assets/list.png" width="24px" height="24px">
      </button>

      <button id="playsound" style="display: flex; justify-content: center; background-color: transparent; border-radius: 10px; align-items: center; position: absolute; top: 150px; left: 200px; height: 32px; width: 50px; cursor: pointer;" type="button" class="playsound">
        <img id="playimg" src="src/assets/play.png" width="24px" height="24px">
      </button>

      <button id="refreshsounds" style="display: flex; justify-content: center; background-color: transparent; border-radius: 10px; align-items: center; position: absolute; top: 150px; left: 255px; height: 32px; width: 50px; cursor: pointer;" type="button" class="playsound">
        <img id="rfimg" src="src/assets/refresh.png" width="24px" height="24px">
      </button>

      <label class="lb2" id="label2">Cpu Limit : </label>
      <input type="range" id="cpuratelimit" class="cpuratelimit" min="0" max="100" value="0" step="1">
      <label class="lb3" id="label3">Gpu Limit : </label>
      <input type="range" id="gpuratelimit" class="gpuratelimit" min="0" max="100" value="0" step="1">
      <label class="lb4" id="label4">Ram Limit : </label>
      <input type="range" id="ramratelimit" class="ramratelimit" min="0" max="100" value="0" step="1">
      <label class="lb5" id="label5">Heat : </label>
      <input type="range" id="heatratelimit" class="heatratelimit" min="0" max="100" value="0" step="1">


      <div class="adjustmentsdiv" id="adjustmentsdiv">
        <h1 style="font-family: Audiowide; color: white; position: absolute; top: -20px; left: 110px" id="adjdivtitle">Adjustments</h1>
        <label class="lb7" id="label7">Sound Level : </label>
        <input type="range" id="soundlevel" class="soundlevel" min="0" max="200" value="0" step="1">
        <label class="lb8" id="label8">Check Interval : </label>
        <input type="range" id="checkinterval" class="checkinterval" min="0" max="10.0" value="0" step="0.1">
        <label class="lb9" id="label9">Choose a soundFX</label>
        <select class="soundfxlist" id="soundfxlist">
          <option value="None">Select a soundFX</option>
          <option value="1.5x">Speed up 1.5x</option>
          <option value="1.75x">Speed up 1.75x</option>
          <option value="2.0x">Speed up 2.0x</option>
          <option value="2.5x">Speed up 2.5x</option>
          <option value="3.0x">Speed up 3.0x</option>
        </select>
      </div>

    </div>
  </body>
</html>
